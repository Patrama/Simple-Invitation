<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>You're Invited</title>
<meta name="description" content="An online invitation.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Cover gate: a single tap starts music + requests motion permission
       (both require a user gesture on mobile browsers) -->
  <div id="gate">
    <div class="panel__inner">
      <p class="eyebrow" id="gate-eyebrow"></p>
      <h1 class="title" id="gate-title"></h1>
      <button class="btn" id="open-btn">Open Invitation</button>
    </div>
  </div>

  <button class="chrome-btn" id="theme-toggle" aria-label="Switch light/dark theme">
    <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
  </button>
  <button class="chrome-btn" id="music-toggle" aria-label="Play or pause background music" aria-pressed="false">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
  </button>

  <nav class="dot-nav" id="dot-nav" aria-label="Sections"></nav>

  <main class="panels" id="panels">

    <!-- 1 · COVER -->
    <section class="panel cover" data-panel>
      <div class="parallax-layer" data-depth="0.02" aria-hidden="true">
        <svg viewBox="0 0 400 800" preserveAspectRatio="xMidYMid slice" style="width:100%;height:100%">
          <circle cx="60" cy="120" r="70" fill="var(--accent)" opacity="0.08"/>
          <circle cx="340" cy="640" r="90" fill="var(--accent-2)" opacity="0.10"/>
        </svg>
      </div>
      <div class="parallax-layer is-fg" data-depth="0.09" aria-hidden="true">
        <svg viewBox="0 0 400 800" style="width:100%;height:100%">
          <g fill="var(--accent-2)" opacity="0.7">
            <circle cx="40" cy="90" r="4"/><circle cx="90" cy="60" r="3"/>
            <circle cx="360" cy="110" r="4"/><circle cx="320" cy="70" r="3"/>
            <circle cx="30" cy="700" r="3"/><circle cx="370" cy="740" r="4"/>
          </g>
          <g fill="var(--accent)" opacity="0.6">
            <rect x="60" y="130" width="6" height="6" rx="1" transform="rotate(20 60 130)"/>
            <rect x="340" y="150" width="6" height="6" rx="1" transform="rotate(-15 340 150)"/>
            <rect x="70" y="660" width="6" height="6" rx="1" transform="rotate(35 70 660)"/>
          </g>
        </svg>
      </div>
      <div class="panel__inner">
        <p class="eyebrow" data-copy="eyebrow"></p>
        <div class="arch-frame">
          <div class="arch-frame__ring" aria-hidden="true"></div>
          <div class="arch-frame__stage" id="feature-stage"></div>
        </div>
        <h1 class="title" id="title-block"></h1>
        <p class="lede" data-copy="tagline"></p>
      </div>
    </section>

    <!-- 2 · COUNTDOWN -->
    <section class="panel" data-panel>
      <div class="parallax-layer" data-depth="0.05" aria-hidden="true">
        <svg viewBox="0 0 400 800" style="width:100%;height:100%">
          <path d="M0 620 Q100 560 200 620 T400 620 V800 H0 Z" fill="var(--paper)" opacity="0.06"/>
        </svg>
      </div>
      <div class="panel__inner">
        <p class="eyebrow">Save the date</p>
        <h2>Counting down</h2>
        <div class="countdown" id="countdown" role="timer" aria-live="off">
          <div class="countdown__unit"><div class="countdown__num" id="cd-days">00</div><div class="countdown__label">Days</div></div>
          <div class="countdown__unit"><div class="countdown__num" id="cd-hours">00</div><div class="countdown__label">Hours</div></div>
          <div class="countdown__unit"><div class="countdown__num" id="cd-mins">00</div><div class="countdown__label">Mins</div></div>
          <div class="countdown__unit"><div class="countdown__num" id="cd-secs">00</div><div class="countdown__label">Secs</div></div>
        </div>
        <div class="date-card">
          <strong id="date-label"></strong>
          <span id="time-label"></span>
        </div>
      </div>
    </section>

    <!-- 3 · LOCATION -->
    <section class="panel" data-panel>
      <div class="parallax-layer" data-depth="0.05" aria-hidden="true">
        <svg viewBox="0 0 400 800" style="width:100%;height:100%">
          <path d="M0 200 Q200 260 400 200 V0 H0 Z" fill="var(--accent)" opacity="0.06"/>
        </svg>
      </div>
      <div class="panel__inner">
        <p class="eyebrow">Where to find us</p>
        <h2 id="venue-name"></h2>
        <p class="lede" id="venue-address"></p>
        <div class="map-frame">
          <iframe id="map-iframe" title="Venue map" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
        <a class="btn btn--ghost" id="directions-link" target="_blank" rel="noopener">Get directions</a>
      </div>
    </section>

    <!-- 4 · RSVP -->
    <section class="panel" data-panel>
      <div class="panel__inner">
        <p class="eyebrow">Kindly reply</p>
        <h2>Will you join us?</h2>
        <form class="rsvp-form" id="rsvp-form">
          <div class="attend-group" role="radiogroup" aria-label="Attendance">
            <label class="attend-option"><input type="radio" name="attendance" value="Will attend" required><span>Will attend</span></label>
            <label class="attend-option"><input type="radio" name="attendance" value="Maybe"><span>Maybe</span></label>
            <label class="attend-option"><input type="radio" name="attendance" value="Can't attend"><span>Can't attend</span></label>
          </div>
          <div class="field">
            <label for="rsvp-name" class="visually-hidden">Your name</label>
            <input type="text" id="rsvp-name" name="name" placeholder="Your name" required autocomplete="name">
          </div>
          <div class="field">
            <label for="rsvp-comment" class="visually-hidden">Message</label>
            <textarea id="rsvp-comment" name="comment" placeholder="Leave a message (optional)"></textarea>
          </div>
          <button class="btn" type="submit">Send RSVP</button>
          <p class="rsvp-status" id="rsvp-status" role="status"></p>
        </form>
      </div>
    </section>

    <!-- 5 · GIFTS -->
    <section class="panel" data-panel>
      <div class="panel__inner" style="width:min(680px,100%)">
        <p class="eyebrow">With love, if you wish</p>
        <h2>A gift</h2>
        <div class="gift-grid" id="gift-grid"></div>
      </div>
    </section>

    <!-- 6 · THANK YOU -->
    <section class="panel thankyou" data-panel>
      <div class="parallax-layer" data-depth="0.06" aria-hidden="true">
        <svg viewBox="0 0 400 800" style="width:100%;height:100%">
          <g fill="var(--accent-2)" opacity="0.5">
            <circle cx="60" cy="120" r="4"/><circle cx="340" cy="160" r="3"/>
            <circle cx="80" cy="680" r="3"/><circle cx="320" cy="720" r="4"/>
          </g>
        </svg>
      </div>
      <div class="panel__inner">
        <p class="eyebrow">✿</p>
        <h2 id="thankyou-heading"></h2>
        <p class="lede" id="thankyou-body"></p>
      </div>
    </section>

  </main>

  <audio id="bg-audio" loop preload="none"></audio>

  <script>
    // Screen-reader-only utility used by RSVP labels
    var s = document.createElement('style');
    s.textContent = '.visually-hidden{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}';
    document.head.appendChild(s);
  </script>
  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
